  <!-- Cardinal tick marks -->
  <line x1="36" y1="4" x2="36" y2="10" stroke="#1a1400" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="62" x2="36" y2="68" stroke="#1a1400" stroke-width="1" stroke-linecap="round"/>
  <line x1="4" y1="36" x2="10" y2="36" stroke="#1a1400" stroke-width="1" stroke-linecap="round"/>
  <line x1="62" y1="36" x2="68" y2="36" stroke="#1a1400" stroke-width="1" stroke-linecap="round"/>
  <!-- Center node -->
  <circle cx="36" cy="36" r="3" fill="#1a1400"/>
</svg>
