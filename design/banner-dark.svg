  <line x1="356" y1="46" x2="356" y2="98" stroke="#F0C040" stroke-width="1" opacity="0.4"/>

  <!-- Title -->
  <text x="376" y="72" fill="#F0C040" font-family="'Rajdhani', 'Segoe UI', Arial, sans-serif" font-weight="600" font-size="30" letter-spacing="5">ZERO OPERATORS</text>

  <!-- Subtitle -->
  <text x="376" y="96" fill="#8a6020" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="11" letter-spacing="3.5">AUTONOMOUS AI SYSTEMS</text>

  <!-- Bottom tagline -->
