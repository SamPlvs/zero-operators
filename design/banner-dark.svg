<svg width="800" height="220" viewBox="0 0 800 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="220" fill="#080808"/>

  <!-- Subtle top/bottom border glow -->
  <line x1="0" y1="0" x2="800" y2="0" stroke="#F0C040" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="219" x2="800" y2="219" stroke="#F0C040" stroke-width="1" opacity="0.15"/>

  <!-- Orbital mark — centered at x=310 -->
  <g transform="translate(274, 36)">
    <circle cx="36" cy="36" r="32" stroke="#F0C040" stroke-width="1.2"/>
    <circle cx="36" cy="36" r="24" stroke="#F0C040" stroke-width="0.6" stroke-dasharray="3 4"/>
    <line x1="12" y1="60" x2="60" y2="12" stroke="#F0C040" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="36" y1="4" x2="36" y2="10" stroke="#F0C040" stroke-width="1" stroke-linecap="round"/>
    <line x1="36" y1="62" x2="36" y2="68" stroke="#F0C040" stroke-width="1" stroke-linecap="round"/>
    <line x1="4" y1="36" x2="10" y2="36" stroke="#F0C040" stroke-width="1" stroke-linecap="round"/>
    <line x1="62" y1="36" x2="68" y2="36" stroke="#F0C040" stroke-width="1" stroke-linecap="round"/>
