name: Validate docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    name: Validate documentation consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run validate-docs.sh
        run: ./scripts/validate-docs.sh
